<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evola Dashboard - Gemini Web API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .sidebar-item:hover { background-color: #374151; }
        .active-tab { background-color: #374151; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">
    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-lg shadow-2xl w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Evola Login</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1 text-gray-400">Username</label>
                    <input type="text" id="username" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm mb-1 text-gray-400">Password</label>
                    <input type="password" id="password" class="w-full p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold transition">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="hidden flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-800 shadow-xl">
            <div class="p-6 text-2xl font-bold text-blue-400 border-b border-gray-700">Evola Panel</div>
            <nav class="mt-6">
                <a href="#" onclick="showSection('stats')" class="sidebar-item active-tab block px-6 py-3 flex items-center"><i class="fas fa-chart-line mr-3"></i> Stats</a>
                <a href="#" onclick="showSection('cookies')" class="sidebar-item block px-6 py-3 flex items-center"><i class="fas fa-cookie mr-3"></i> Cookies</a>
                <a href="#" onclick="showSection('keys')" class="sidebar-item block px-6 py-3 flex items-center"><i class="fas fa-key mr-3"></i> API Keys</a>
                <a href="#" onclick="showSection('logs')" class="sidebar-item block px-6 py-3 flex items-center"><i class="fas fa-list mr-3"></i> Logs</a>
                <a href="#" onclick="logout()" class="sidebar-item block px-6 py-3 flex items-center text-red-400 mt-20"><i class="fas fa-sign-out-alt mr-3"></i> Logout</a>
            </nav>
        </div>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-10 bg-gray-900">
            <!-- Stats Section -->
            <div id="statsSection" class="section">
                <h1 class="text-3xl font-bold mb-8">Dashboard Overview</h1>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-gray-800 p-6 rounded-lg shadow border-l-4 border-blue-500">
                        <div class="text-gray-400 uppercase text-xs font-bold">Total Cookies</div>
                        <div id="totalCookies" class="text-4xl font-bold mt-2">0</div>
                    </div>
                    <div class="bg-gray-800 p-6 rounded-lg shadow border-l-4 border-green-500">
                        <div class="text-gray-400 uppercase text-xs font-bold">Active Sessions</div>
                        <div id="activeCookies" class="text-4xl font-bold mt-2">0</div>
                    </div>
                    <div class="bg-gray-800 p-6 rounded-lg shadow border-l-4 border-purple-500">
                        <div class="text-gray-400 uppercase text-xs font-bold">Total API Keys</div>
                        <div id="totalKeys" class="text-4xl font-bold mt-2">0</div>
                    </div>
                </div>
            </div>

            <!-- Cookies Section -->
            <div id="cookiesSection" class="section hidden">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold">Cookie Management</h1>
                    <button onclick="toggleModal('cookieModal')" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 transition"><i class="fas fa-plus mr-2"></i> Add Cookie</button>
                </div>
                <div class="bg-gray-800 rounded-lg overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-700 text-gray-300">
                            <tr>
                                <th class="p-4">Gmail</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Last Refresh</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cookieTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Keys Section -->
            <div id="keysSection" class="section hidden">
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-bold">API Key Access</h1>
                    <button onclick="toggleModal('keyModal')" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 transition"><i class="fas fa-plus mr-2"></i> Generate Key</button>
                </div>
                <div class="bg-gray-800 rounded-lg overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-700 text-gray-300">
                            <tr>
                                <th class="p-4">Label</th>
                                <th class="p-4">API Key</th>
                                <th class="p-4">Status</th>
                                <th class="p-4">Action</th>
                            </tr>
                        </thead>
                        <tbody id="keyTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Logs Section -->
            <div id="logsSection" class="section hidden">
                <h1 class="text-3xl font-bold mb-8">System Logs</h1>
                <div class="bg-gray-800 rounded-lg p-4 font-mono text-sm max-h-[600px] overflow-y-auto" id="logContainer"></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="cookieModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded w-[500px]">
            <h2 class="text-xl font-bold mb-4">Add New Session</h2>
            <input type="text" id="gmailInput" placeholder="Gmail Address" class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600">
            <textarea id="psidInput" placeholder="SECURE_1PSID" class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600 h-24"></textarea>
            <textarea id="psidtsInput" placeholder="SECURE_1PSIDTS" class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600 h-24"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="toggleModal('cookieModal')" class="px-4 py-2 bg-gray-600 rounded">Cancel</button>
                <button onclick="addCookie()" class="px-4 py-2 bg-blue-600 rounded">Save</button>
            </div>
        </div>
    </div>

    <div id="keyModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded w-96">
            <h2 class="text-xl font-bold mb-4">New API Key</h2>
            <input type="text" id="keyLabel" placeholder="Key Label (e.g. Production App)" class="w-full p-2 mb-4 bg-gray-700 rounded border border-gray-600">
            <div class="flex justify-end gap-2">
                <button onclick="toggleModal('keyModal')" class="px-4 py-2 bg-gray-600 rounded">Cancel</button>
                <button onclick="createKey()" class="px-4 py-2 bg-blue-600 rounded">Generate</button>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        if(token) loginSuccess();

        async function login() {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if(data.status === 'success') {
                localStorage.setItem('token', data.token);
                loginSuccess();
            } else alert('Invalid credentials');
        }

        function loginSuccess() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            loadStats();
        }

        function logout() {
            localStorage.removeItem('token');
            location.reload();
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id + 'Section').classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active-tab'));
            event.currentTarget.classList.add('active-tab');
            if(id === 'cookies') loadCookies();
            if(id === 'keys') loadKeys();
            if(id === 'logs') loadLogs();
            if(id === 'stats') loadStats();
        }

        async function loadStats() {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('totalCookies').innerText = data.total_cookies;
            document.getElementById('activeCookies').innerText = data.active_cookies;
            document.getElementById('totalKeys').innerText = data.total_keys;
        }

        async function loadCookies() {
            const res = await fetch('/api/cookies');
            const cookies = await res.json();
            const body = document.getElementById('cookieTableBody');
            body.innerHTML = cookies.map(c => `
                <tr class="border-b border-gray-700">
                    <td class="p-4">${c.gmail}</td>
                    <td class="p-4"><span class="px-2 py-1 rounded text-xs ${c.status === 'alive' ? 'bg-green-900 text-green-300' : 'bg-red-900 text-red-300'}">${c.status}</span></td>
                    <td class="p-4">${new Date(c.last_refreshed_at).toLocaleString()}</td>
                    <td class="p-4"><button onclick="deleteCookie('${c.gmail}')" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function addCookie() {
            await fetch('/api/cookies', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    gmail: document.getElementById('gmailInput').value,
                    secure_1psid: document.getElementById('psidInput').value,
                    secure_1psidts: document.getElementById('psidtsInput').value
                })
            });
            toggleModal('cookieModal');
            loadCookies();
        }

        async function deleteCookie(gmail) {
            if(confirm('Delete this cookie?')) {
                await fetch(`/api/cookies/${gmail}`, {method: 'DELETE'});
                loadCookies();
            }
        }

        async function loadKeys() {
            const res = await fetch('/api/keys');
            const keys = await res.json();
            const body = document.getElementById('keyTableBody');
            body.innerHTML = keys.map(k => `
                <tr class="border-b border-gray-700">
                    <td class="p-4">${k.label}</td>
                    <td class="p-4 font-mono text-sm text-blue-300">${k.key}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-green-900 text-green-300 rounded text-xs">Active</span></td>
                    <td class="p-4"><button onclick="deleteKey(${k.id})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function createKey() {
            await fetch('/api/keys', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({label: document.getElementById('keyLabel').value})
            });
            toggleModal('keyModal');
            loadKeys();
        }

        async function deleteKey(id) {
            if(confirm('Revoke this API Key?')) {
                await fetch(`/api/keys/${id}`, {method: 'DELETE'});
                loadKeys();
            }
        }

        async function loadLogs() {
            const res = await fetch('/api/logs');
            const logs = await res.json();
            const container = document.getElementById('logContainer');
            container.innerHTML = logs.map(l => `
                <div class="mb-2 ${l.event_type === 'error' ? 'text-red-400' : 'text-gray-300'}">
                    [${new Date(l.created_at).toLocaleTimeString()}] [${l.event_type.toUpperCase()}] ${l.gmail ? '('+l.gmail+') ' : ''}${l.message}
                </div>
            `).join('');
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('hidden');
        }
    </script>
</body>
</html>
